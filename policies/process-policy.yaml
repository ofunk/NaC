version: 1
positioning:
  model: notariat_as_code
  operating_principle: enterprise_gitops
  implementation_label: noc
baseline:
  generic_modules:
    - formation
    - invoice
    - bookkeeping
    - tax
  required_controls:
    - pull_request
    - review
    - traceability
    - periodic_close
    - role_based_permissions
    - qualification_gates
branch_modules:
  law_firm:
    enabled: false
    includes:
      - mandate_intake
      - conflict_check
      - deadline_control
  notary:
    enabled: true
    includes:
      - deed_preparation
      - identity_verification
      - execution_tracking
  tax_office:
    enabled: false
    includes:
      - client_onboarding
      - declaration_cycle
      - plausibility_checks
  software_company:
    enabled: true
    includes:
      - release_governance
      - incident_management
      - service_level_reporting
  wealth_management:
    enabled: true
    includes:
      - client_intake_and_kyc
      - portfolio_rebalancing_control
      - suitability_and_risk_profile_review
      - mandate_reporting_and_audit
  property_management:
    enabled: true
    includes:
      - tenant_intake_and_contract_setup
      - maintenance_ticket_and_vendor_dispatch
      - service_charge_and_budget_control
      - handover_and_damage_documentation
  carpentry:
    enabled: false
    includes:
      - customer_intake
      - quoting_and_measurement
      - workshop_and_installation
      - warranty_tracking
change_management:
  require_change_request: true
  require_impact_assessment: true
  require_version_bump: true
  require_commit_for_update_completion: true
  require_github_push_for_update_completion: true
  require_target_branch_merge_for_update_completion: true
  completion_target_branch: main
  completion_remote: github

release_sync:
  upstream_sync_only_via_pull_request: true
  default_sync_cycle: monthly_or_quarterly
  require_upstream_release_reference: true

parallel_operation:
  bind_case_to_version_on_start: true
  running_cases_keep_bound_version: true
  require_exception_approval_for_rebinding: true

issue_governance:
  single_leading_issue_per_topic: true
  require_cross_repo_issue_links: true

operating_cadence:
  default_method: agile
  allowed_methods:
    - agile
    - kanban
  allowed_sprint_durations:
    - 1w
    - 2w
    - 4w
  allowed_daily_durations:
    - 5m
    - 10m
    - 20m
  allowed_kanban_review_cadences:
    - 1w
    - 2w
    - 4w
  allowed_kanban_sync_durations:
    - 5m
    - 10m
    - 20m

role_model:
  required_policy: policies/role-model-policy.yaml
  everyone_can_open_ticket: true
