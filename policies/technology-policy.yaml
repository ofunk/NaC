version: 1
status: mandatory

approved_stack:
  documentation:
    canonical_format: markdown
    export:
      pdf: pandoc
      assets: svg_png
    notes:
      - "Markdown ist die einzig manuell gepflegte Quellform."
      - "AsciiDoc oder andere Formate dürfen nur als generierte Artefakte entstehen."
  process_logic:
    execution_language: python
    approach: model_first
    operating_surface: nac_cli
    cli_entrypoint: nac
    cli_wrapper: scripts/nac.py
    notes:
      - "Python implementiert Ausführung, Validierung und Integrationen."
      - "Fachlicher Ablauf wird primär als BPMN 2.0 modelliert."
      - "Neue NaC-Funktionalität muss über die zentrale nac-CLI erreichbar sein; direkte Skripte bleiben nur interne oder kompatible Bedienebenen."
  visualization:
    canonical_business_model: bpmn_2_0
    canonical_source_format: bpmn_xml
    canonical_directory: bpmn/
    visual_editor: bpmn_js
    model_extension: bpmn/nac-moddle.json
    validator: scripts/validate_bpmn_models.py
    allowed_overview_format: mermaid
    disallowed_for_bpmn_source:
      - mermaid
      - plantuml
    notes:
      - "bpmn-js ist die geplante visuelle Bearbeitungsschicht für BPMN-2.0-Modelle."
      - "Python validiert BPMN-Modelle, NaC-Properties und bpmn-js-taugliche Profilmodelle vor Merge."
      - "Mermaid ist nur für Übersichtsdiagramme erlaubt."
      - "PlantUML ist optional für technische Architektur, nicht für BPMN-Quellen."

repository_constraints:
  enforce_cross_ide_sync: true
  required_sync_targets:
    - .cursor/rules
    - .github/copilot-instructions.md
    - docs/de/START_HERE.md
    - docs/en/START_HERE.md
    - docs/de/vscode-copilot-start.md
    - docs/en/vscode-copilot-start.md
    - policies/language-policy.yaml

exceptions:
  allowed: true
  process:
    - "Change Request mit Begründung"
    - "Bewertung durch Prozessverantwortliche"
    - "Dokumentierte Freigabe mit Versionshinweis"
