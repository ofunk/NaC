name: Export Documentation PDF

on:
  workflow_dispatch:

jobs:
  export-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-xetex

      - name: Build German business handbook PDF
        run: |
          mkdir -p out/de
          pandoc \
            README.md \
            docs/de/START_HERE.md \
            docs/de/fachanwender-guide.md \
            docs/de/business-os.md \
            docs/de/governance.md \
            docs/de/technology-decision.md \
            docs/de/vscode-copilot-start.md \
            docs/de/copilot-quickstart-15min.md \
            docs/de/public-readiness.md \
            --from gfm \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -o out/de/business-os-handbook.pdf

      - name: Build English business handbook PDF
        run: |
          mkdir -p out/en
          pandoc \
            README.md \
            docs/en/START_HERE.md \
            docs/en/fachanwender-guide.md \
            docs/en/business-os.md \
            docs/en/governance.md \
            docs/en/technology-decision.md \
            docs/en/vscode-copilot-start.md \
            docs/en/copilot-quickstart-15min.md \
            docs/en/public-readiness.md \
            --from gfm \
            --toc \
            --number-sections \
            --pdf-engine=xelatex \
            -o out/en/business-os-handbook.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: business-os-handbook-pdf
          path: out/
