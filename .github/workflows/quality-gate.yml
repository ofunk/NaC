name: NoC Quality Gate

on:
  push:
    paths:
      - "processes/**/*.json"
      - "schemas/**/*.json"
      - "src/business_os/**/*.py"
      - "tests/**/*.py"
      - "scripts/**/*.py"
      - "policies/**/*.yaml"
      - "policies/**/*.json"
      - "docs/**/*.md"
      - "prompts/**/*.md"
      - "plugins/**"
      - "workflows/**"
      - "usecases/**"
      - "roadmap/**"
      - ".cursor/rules/**/*.mdc"
      - ".github/workflows/*.yml"
      - ".github/copilot-instructions.md"
      - "AGENTS.md"
      - "README.md"
      - "pyproject.toml"
  pull_request:
    paths:
      - "processes/**/*.json"
      - "schemas/**/*.json"
      - "src/business_os/**/*.py"
      - "tests/**/*.py"
      - "scripts/**/*.py"
      - "policies/**/*.yaml"
      - "policies/**/*.json"
      - "docs/**/*.md"
      - "prompts/**/*.md"
      - "plugins/**"
      - "workflows/**"
      - "usecases/**"
      - "roadmap/**"
      - ".cursor/rules/**/*.mdc"
      - ".github/workflows/*.yml"
      - ".github/copilot-instructions.md"
      - "AGENTS.md"
      - "README.md"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Run strict quality gate
        run: python scripts/quality_gate.py --profile strict

      - name: Render PR quality gate comment
        if: always() && github.event_name == 'pull_request'
        run: python scripts/render_quality_gate_comment.py --input out/quality/status.json --output out/quality/comment.md

      - name: Upsert PR quality gate comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- noc-quality-gate-comment -->';
            const body = fs.readFileSync('out/quality/comment.md', 'utf8');
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              }
            );
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated quality gate comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
              core.info(`Created quality gate comment ${created.data.id}`);
            }

      - name: Upload quality gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noc-quality-gate
          path: out/quality/
